<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalle Plato</title>
</head>
<body>


<h1  th:text="'Plato ' + ${dish.id}"> </h1>

<p th:text="'Nombre ' + ${dish.name}"></p>

<p th:text="'Precio '+ ${dish.price !=null ? dish.price + ' $(EUR)': 'Sin precio'}"></p>

<p th:text="'Descripcion ' + ${dish.description != null ? dish.description : 'Sin descripcion'}"></p>

<!--switch sobre enum tipo de plato dishtype,(Traer los tipos de platos , los principales,postres.. lo que tengamos en em enum en este caso en dishtype)-->

<p th:switch = "${dish.dishType}">
    <span th:case = "${T(com.restaurantes.model.enums.DishType).STARTER}">Entrantes </span>
    <span th:case = "${T(com.restaurantes.model.enums.DishType).MAIN}">Platos Principales </span>
    <span th:case = "${T(com.restaurantes.model.enums.DishType).DESSERT}">Postres </span>
    <span th:case = "*">No definido. </span>


</p>
<!--para volver al restaurante del que se vino-->
<p th:if="${dish.restaurant != null}">
    Este plato pertenece al restaurante
    <a th:href="@{/restaurants/{id}(id=${dish.restaurant.id})}" th:text=" ${dish.restaurant.name}"></a>
</p>

</body>
</html>
